<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-blue-500 dark:text-blue-400" style="font-variation-settings: 'FILL' 1;">shield</span>
<span class="font-['Inter'] uppercase tracking-widest text-xs font-bold text-on-surface">BENIN CYBER SHIELD</span>
</div>
<button class="text-slate-400 hover:bg-slate-900 transition-colors active:opacity-80 p-1 rounded">
<span class="material-symbols-outlined">settings</span>
</button>
</header>
<!-- Main Content Canvas (Loading State - No Bottom Nav) -->
<main class="flex-1 flex flex-col items-center justify-center p-container-margin pt-[72px] pb-[40px]">
<!-- Analysis Card -->
<div class="bg-surface border border-surface-variant rounded-lg p-6 w-full flex flex-col items-center">
<!-- Animated Icon Placeholder (Static Representation) -->
<div class="relative w-[120px] h-[120px] flex items-center justify-center mb-8">
<!-- Outer Scan Rings -->
<div class="absolute inset-0 border-[2px] border-primary rounded-full opacity-20"></div>
<div class="absolute inset-2 border-[2px] border-primary border-t-transparent border-r-transparent rounded-full opacity-60 transform -rotate-45"></div>
<div class="absolute inset-4 border border-surface-variant rounded-full"></div>
<!-- Core Icon -->
<span class="material-symbols-outlined text-[48px] text-primary" style="font-variation-settings: 'FILL' 1;">shield</span>
</div>
<!-- Status Text -->
<h2 class="font-h2 text-h2 text-on-surface mb-8">Analyse en cours...</h2>
<!-- Progress Steps List -->
<div class="w-full flex flex-col gap-4">
<!-- Step 1: Done -->
<div class="flex items-center gap-4 border border-surface-variant p-3 rounded bg-surface-container-low">
<span class="material-symbols-outlined text-secondary-fixed-dim text-[20px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-data-sm text-data-sm text-secondary-fixed-dim">Extraction des métadonnées</span>
</div>
<!-- Step 2: Active -->
<div class="flex items-center gap-4 border border-primary/30 p-3 rounded bg-primary/5">
<span class="material-symbols-outlined text-primary text-[20px]">sync</span>
<span class="font-data-sm text-data-sm text-primary">Analyse heuristique</span>
</div>
<!-- Step 3: Pending -->
<div class="flex items-center gap-4 border border-surface-container-highest p-3 rounded opacity-50">
<span class="material-symbols-outlined text-outline-variant text-[20px]">radio_button_unchecked</span>
<span class="font-data-sm text-data-sm text-outline-variant">Vérification des signatures</span>
</div>
<!-- Step 4: Pending -->
<div class="flex items-center gap-4 border border-surface-container-highest p-3 rounded opacity-50">
<span class="material-symbols-outlined text-outline-variant text-[20px]">radio_button_unchecked</span>
<span class="font-data-sm text-data-sm text-outline-variant">Génération du score</span>
</div>
</div>
<!-- Context Note -->
<div class="mt-8 flex items-center justify-center gap-2 pt-4 border-t border-surface-variant w-full">
<span class="material-symbols-outlined text-tertiary-fixed text-[16px]" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="font-body-sm text-body-sm text-outline">Résultat en moins de 3 secondes</span>
</div>
</div>
