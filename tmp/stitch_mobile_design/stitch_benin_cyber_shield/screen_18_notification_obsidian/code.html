<!DOCTYPE html>

<html class="dark" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Notification Système - Benin Cyber Shield</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed": "#ffdcc6",
                        "primary": "#adc6ff",
                        "on-error-container": "#ffdad6",
                        "secondary-fixed": "#e0e1f2",

                        "surface-container-highest": "#32353c",
                        "surface-container": "#1d2027",
                        "tertiary": "#ffb786",
                        "background": "#10131a",
                        "outline": "#8c909f",
                        "surface-dim": "#10131a",
                        "inverse-on-surface": "#2e3038",
                        "on-secondary-container": "#b2b4c4",
                        "primary-container": "#4d8eff",
                        "secondary-container": "#434653",
                        "on-tertiary-container": "#461f00",
                        "on-tertiary": "#502400",
                        "on-primary-fixed-variant": "#004395",
                        "surface-container-low": "#191b23",
                        "surface-container-high": "#272a31",
                        "primary-fixed-dim": "#adc6ff",
                        "on-error": "#690005",
                        "inverse-surface": "#e1e2ec",
                        "on-surface": "#e1e2ec",
                        "on-tertiary-fixed": "#311400",
                        "surface-variant": "#32353c",
                        "surface-container-lowest": "#0b0e15",
                        "on-primary-fixed": "#001a42",
                        "outline-variant": "#424754",
                        "surface-bright": "#363941",
                        "tertiary-container": "#df7412",
                        "primary-fixed": "#d8e2ff",
                        "tertiary-fixed-dim": "#ffb786",
                        "surface": "#10131a",
                        "on-tertiary-fixed-variant": "#723600",
                        "on-background": "#e1e2ec",
                        "on-primary-container": "#00285d",
                        "on-secondary-fixed-variant": "#434653",
                        "on-primary": "#002e6a",
                        "error-container": "#93000a",
                        "inverse-primary": "#005ac2",
                        "on-secondary-fixed": "#181b27",
                        "secondary-fixed-dim": "#c4c5d5",
                        "surface-tint": "#adc6ff",
                        "secondary": "#c4c5d5",
                        "on-secondary": "#2d303c",
                        "on-surface-variant": "#c2c6d6"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-md": "16px",
                        "stack-lg": "32px",
                        "stack-sm": "8px",
                        "unit": "4px",
                        "margin-page": "24px",
                        "padding-card": "20px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Manrope"],
                        "body-md": ["Manrope"],
                        "code-sm": ["JetBrains Mono"],
                        "headline-xl": ["Manrope"],
                        "label-caps": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "400"}],

<style>
        /* Essential utility for Material Symbols specific weight/fill manipulation if needed inline */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen w-full relative overflow-hidden font-body-md selection:bg-primary-container selection:text-on-primary-container">
<!-- Simulated Android Home Screen Wallpaper (CSS Gradient) -->
<div class="absolute inset-0 z-0 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-surface-container-high/40 via-background to-[#020305]">
<!-- Subtle noise overlay for texture -->
<div class="absolute inset-0 opacity-[0.03]" style="background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22/%3E%3C/svg%3E'); mix-blend-mode: overlay;"></div>
</div>
<!-- Main Content Canvas (Notice Navigation Shells are SUPPRESSED per logic rules for transient overlay states) -->
<main class="relative z-10 w-full h-screen flex flex-col items-center pt-[88px] px-margin-page">
<!-- Obsidian Glass Notification Card -->
<!-- Elevation: rgba(14, 18, 30, 0.72) approximated via surface-container + opacity + blur -->
<div class="w-full max-w-[420px] bg-surface-container/70 backdrop-blur-[24px] ring-1 ring-white/10 rounded-lg p-padding-card shadow-[0_32px_64px_-12px_rgba(0,0,0,0.8)] transform transition-transform hover:scale-[1.01] duration-300">
<!-- Header: App Identity & Meta -->
<div class="flex items-center justify-between mb-stack-md">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center ring-1 ring-primary/20">
<span class="material-symbols-outlined text-[18px] text-primary">security</span>
</div>
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Benin Cyber Shield</span>
</div>
<div class="flex items-center gap-2 text-on-surface-variant/60">
<span class="w-1 h-1 rounded-full bg-on-surface-variant/40"></span>
<span class="font-label-caps text-label-caps">À l'instant</span>
</div>
</div>
<!-- Content Area -->
<div class="flex flex-col gap-unit mb-stack-md">
<h2 class="font-headline-lg text-headline-lg text-on-surface">Alerte de Sécurité</h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-2">Une activité réseau inhabituelle a été détectée sur votre appareil.</p>
<!-- Metrics / Status Cluster -->
<div class="flex items-center gap-4 mt-stack-sm p-4 rounded-DEFAULT bg-surface-container-lowest/50 ring-1 ring-white/5">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-outline">radar</span>
<span class="font-code-sm text-code-sm text-on-surface">Score: <span class="text-error font-bold">87/100</span></span>
</div>
<div class="h-4 w-px bg-outline-variant/30"></div>
<!-- Status Chip (Tinted Glass Look) -->
<div class="flex items-center gap-1.5 px-3 py-1 rounded-full bg-error/15 ring-1 ring-error/30">
<span class="material-symbols-outlined text-[14px] text-error icon-fill">warning</span>
<span class="font-label-caps text-label-caps text-error uppercase">Élevé</span>
</div>
</div>
</div>
<!-- Action Buttons Footer -->
<div class="flex items-center justify-end gap-3 mt-stack-lg">
<!-- Ghost Glass Secondary Button -->
<button class="px-5 py-2.5 rounded-full font-label-caps text-label-caps text-on-surface-variant ring-1 ring-outline-variant/50 hover:bg-white/5 hover:text-on-surface transition-all duration-200 uppercase tracking-widest">
                    Ignorer
                </button>
<!-- Sapphire Blue Primary Button -->
<button class="px-6 py-2.5 rounded-full font-label-caps text-label-caps bg-primary text-on-primary hover:bg-primary-fixed hover:shadow-[0_0_20px_rgba(173,198,255,0.3)] transition-all duration-200 uppercase tracking-widest flex items-center gap-2">
                    Voir l'analyse
                    <span class="material-symbols-outlined text-[16px]">arrow_forward</span>
</button>
</div>
</div>
</main>
</body></html>
