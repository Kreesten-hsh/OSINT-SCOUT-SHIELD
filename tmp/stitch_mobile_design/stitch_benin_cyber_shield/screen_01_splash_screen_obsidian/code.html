<style>
        body {
            background-color: #07090F;
            position: relative;
            overflow: hidden;
        }
        
        /* Noise Overlay */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.035;
            pointer-events: none;
            z-index: 10;
        }

        /* Ambient Glow */
        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vh;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(7, 9, 15, 0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        /* Concentric Rings */
        .ring-1 {
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .ring-2 {
            box-shadow: 0 0 60px rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .glass-panel {
            background: rgba(14, 18, 30, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);

<body class="text-on-surface min-h-screen flex flex-col items-center justify-center relative">
<!-- Ambient Background Glow -->
<div class="ambient-glow"></div>
<main class="relative z-20 flex flex-col items-center justify-center w-full max-w-md px-margin-page h-screen">
<!-- Logo Area with Concentric Rings -->
<div class="relative flex items-center justify-center mb-stack-lg">

                            security
                        </span>
</div>
</div>
</div>

</div>
