<div class="mb-stack-lg relative flex items-center justify-center">

<div class="w-[80px] h-[80px] rounded-full bg-surface-container/80 border border-outline/30 backdrop-blur-xl flex items-center justify-center relative z-10">
<span class="material-symbols-outlined text-[40px] text-primary" data-icon="check" data-weight="fill">check</span>
</div>
</div>

<div class="text-center mb-stack-lg flex flex-col gap-stack-sm w-full">

            </p>

<span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest">
                Identifiant de suivi
            </span>
<div class="bg-surface-container-lowest/50 border border-outline-variant/50 rounded-DEFAULT px-6 py-3 w-full flex justify-center items-center">
<span class="font-code-sm text-code-sm text-primary tracking-wider">
                    BCS-2024-0847-XK91
                </span>
</div>
</div>

<div class="w-full bg-surface-container border border-outline-variant/30 rounded-DEFAULT p-4 flex items-center gap-gutter mb-stack-lg">
<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-primary text-[20px]" data-icon="cloud_done">cloud_done</span>
</div>
