<!-- Main Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-margin-page relative z-10 w-full max-w-md mx-auto h-screen">
<!-- Celebratory Graphic Container -->
<div class="relative w-64 h-64 mb-stack-lg flex items-center justify-center">
<!-- Success Rings -->
<div class="absolute inset-0 rounded-full border border-primary/20 opacity-50 scale-110"></div>
<div class="absolute inset-4 rounded-full border border-primary/40 opacity-75 scale-105"></div>
<div class="absolute inset-8 rounded-full border border-primary/60 bg-primary/5"></div>
<!-- Central Shield -->
<div class="relative z-10 w-32 h-32 rounded-full bg-surface-container/80 backdrop-blur-xl border border-white/10 shadow-[0_0_60px_rgba(173,198,255,0.15)] flex items-center justify-center">
<span class="material-symbols-outlined text-[72px] text-primary drop-shadow-[0_0_12px_rgba(173,198,255,0.4)]" style="font-variation-settings: 'FILL' 1;">
                    shield_lock
                </span>
<!-- Overlay Checkmark -->
<div class="absolute -bottom-2 -right-2 w-12 h-12 rounded-full bg-surface-container-highest border-2 border-background flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-primary text-[28px]" style="font-variation-settings: 'FILL' 1;">
                        check_circle
                    </span>
</div>
</div>
</div>
<!-- Typography Cluster -->
<div class="text-center mb-stack-lg flex flex-col items-center">
<h1 class="font-headline-xl text-headline-xl text-on-surface mb-stack-sm tracking-tight">
                Système Armé
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px]">
                Votre appareil est désormais protégé par le bouclier cybernétique.
            </p>
</div>
<!-- 3-Stats Glass Pill Row -->
<div class="flex items-center gap-unit mb-stack-lg bg-surface-container-low/60 backdrop-blur-md p-unit rounded-full border border-white/5 shadow-lg">
<div class="flex items-center gap-2 px-4 py-2 rounded-full bg-surface-container/80 border border-white/5">
<span class="material-symbols-outlined text-[16px] text-primary">encrypted</span>
<span class="font-label-caps text-label-caps text-on-surface">AES-256</span>
</div>
<div class="w-px h-6 bg-white/10"></div>
<div class="flex items-center gap-2 px-4 py-2 rounded-full bg-surface-container/80 border border-white/5">
<span class="material-symbols-outlined text-[16px] text-primary">radar</span>

</div>
<div class="w-px h-6 bg-white/10"></div>
<div class="flex items-center gap-2 px-4 py-2 rounded-full bg-surface-container/80 border border-white/5">
<span class="material-symbols-outlined text-[16px] text-primary">cloud_done</span>
<span class="font-label-caps text-label-caps text-on-surface">SYNC</span>
</div>
</div>
