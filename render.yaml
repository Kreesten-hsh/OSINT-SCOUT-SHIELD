services:
  - type: web
    name: bcs-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: PHONE_ENCRYPTION_SECRET
        sync: false
      - key: AUTH_ADMIN_EMAIL
        sync: false
      - key: AUTH_ADMIN_PASSWORD
        sync: false
      - key: AUTH_SME_EMAIL
        sync: false
      - key: AUTH_SME_PASSWORD
        sync: false
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: EXTERNAL_TRANSMISSION_SHARED_SECRET
        sync: false
      - key: EXTERNAL_ANSSI_RECEIVER_URL
        sync: false
      - key: EXTERNAL_OPERATORS_RECEIVER_URL
        sync: false
      - key: ENABLE_FORENSIC_CAPTURE
        value: "false"
      - key: ENABLE_RESULT_CONSUMER
        value: "true"
      - key: ENABLE_EXTERNAL_TRANSMISSION_CONSUMER
        value: "true"
