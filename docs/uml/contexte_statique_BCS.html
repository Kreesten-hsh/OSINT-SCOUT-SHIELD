<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagramme de contexte statique - BENIN CYBER SHIELD</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f8fafc;
      color: #111827;
      font-family: Arial, Helvetica, sans-serif;
      padding: 24px;
    }

    .page {
      background: #ffffff;
      border: 1px solid #d1d5db;
      margin: 0 auto;
      max-width: 1100px;
      padding: 24px;
    }

    h1 {
      color: #14532d;
      font-size: 18px;
      letter-spacing: 0.08em;
      margin-bottom: 18px;
      text-align: center;
      text-transform: uppercase;
    }

    svg {
      display: block;
      height: auto;
      width: 100%;
    }

    @media print {
      body {
        background: #ffffff;
        padding: 0;
      }

      .page {
        border: 0;
        max-width: none;
        padding: 8mm;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>Diagramme de contexte statique - BENIN CYBER SHIELD</h1>

    <svg viewBox="0 0 1080 790" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Diagramme de contexte statique de BENIN CYBER SHIELD">
      <defs>
        <style>
          .system { fill: #ffffff; stroke: #166534; stroke-width: 2.4; }
          .actor-line { stroke: #111827; stroke-width: 2.4; stroke-linecap: round; fill: none; }
          .link { stroke: #4b5563; stroke-width: 1.8; fill: none; }
          .actor-label { fill: #111827; font-size: 18px; font-weight: 700; }
          .stereotype { fill: #4b5563; font-size: 13px; font-weight: 600; }
          .cardinality { fill: #111827; font-size: 17px; font-weight: 700; }
        </style>
      </defs>

      <!-- Rectangle central volontairement vide -->
      <rect x="375" y="120" width="330" height="450" rx="10" class="system" />

      <!-- Acteur Citoyen -->
      <circle cx="130" cy="135" r="20" class="actor-line" />
      <line x1="130" y1="155" x2="130" y2="215" class="actor-line" />
      <line x1="95" y1="175" x2="165" y2="175" class="actor-line" />
      <line x1="130" y1="215" x2="100" y2="265" class="actor-line" />
      <line x1="130" y1="215" x2="160" y2="265" class="actor-line" />
      <text x="130" y="298" text-anchor="middle" class="actor-label">Citoyen</text>

      <!-- Acteur PME -->
      <circle cx="130" cy="420" r="20" class="actor-line" />
      <line x1="130" y1="440" x2="130" y2="500" class="actor-line" />
      <line x1="95" y1="460" x2="165" y2="460" class="actor-line" />
      <line x1="130" y1="500" x2="100" y2="550" class="actor-line" />
      <line x1="130" y1="500" x2="160" y2="550" class="actor-line" />
      <text x="130" y="583" text-anchor="middle" class="actor-label">PME</text>

      <!-- Système ASIN/CNIN -->
      <circle cx="895" cy="135" r="20" class="actor-line" />
      <line x1="895" y1="155" x2="895" y2="215" class="actor-line" />
      <line x1="860" y1="175" x2="930" y2="175" class="actor-line" />
      <line x1="895" y1="215" x2="865" y2="265" class="actor-line" />
      <line x1="895" y1="215" x2="925" y2="265" class="actor-line" />
      <text x="895" y="298" text-anchor="middle" class="actor-label">Syst. ASIN/CNIN</text>
      <text x="895" y="320" text-anchor="middle" class="stereotype">&lt;&lt;système&gt;&gt;</text>

      <!-- Opérateur Mobile -->
      <circle cx="895" cy="365" r="20" class="actor-line" />
      <line x1="895" y1="385" x2="895" y2="445" class="actor-line" />
      <line x1="860" y1="405" x2="930" y2="405" class="actor-line" />
      <line x1="895" y1="445" x2="865" y2="495" class="actor-line" />
      <line x1="895" y1="445" x2="925" y2="495" class="actor-line" />
      <text x="895" y="528" text-anchor="middle" class="actor-label">Opérateur Mobile</text>
      <text x="895" y="550" text-anchor="middle" class="stereotype">&lt;&lt;système&gt;&gt;</text>

      <!-- Acteur Administrateur -->
      <circle cx="895" cy="585" r="20" class="actor-line" />
      <line x1="895" y1="605" x2="895" y2="665" class="actor-line" />
      <line x1="860" y1="625" x2="930" y2="625" class="actor-line" />
      <line x1="895" y1="665" x2="865" y2="715" class="actor-line" />
      <line x1="895" y1="665" x2="925" y2="715" class="actor-line" />
      <text x="895" y="742" text-anchor="middle" class="actor-label">Administrateur</text>

      <!-- Associations -->
      <line x1="170" y1="185" x2="375" y2="220" class="link" />
      <text x="245" y="178" class="cardinality">0..*</text>

      <line x1="170" y1="470" x2="375" y2="440" class="link" />
      <text x="245" y="448" class="cardinality">0..*</text>

      <line x1="705" y1="230" x2="855" y2="185" class="link" />
      <text x="800" y="178" class="cardinality">1</text>

      <line x1="705" y1="350" x2="855" y2="405" class="link" />
      <text x="800" y="365" class="cardinality">1..*</text>

      <line x1="705" y1="500" x2="855" y2="615" class="link" />
      <text x="790" y="560" class="cardinality">1</text>
    </svg>
  </main>
</body>
</html>
