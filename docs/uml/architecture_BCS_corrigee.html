<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Architecture applicative - BENIN CYBER SHIELD</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f8fafc;
      color: #111827;
      font-family: Arial, Helvetica, sans-serif;
      padding: 24px;
    }

    .page {
      background: #ffffff;
      border: 1px solid #d1d5db;
      margin: 0 auto;
      max-width: 980px;
      padding: 24px;
    }

    h1 {
      color: #14532d;
      font-size: 18px;
      letter-spacing: 0.08em;
      margin-bottom: 18px;
      text-align: center;
      text-transform: uppercase;
    }

    svg {
      display: block;
      height: auto;
      width: 100%;
    }

    @media print {
      body {
        background: #ffffff;
        padding: 0;
      }

      .page {
        border: 0;
        max-width: none;
        padding: 8mm;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>Architecture applicative - BENIN CYBER SHIELD</h1>

    <svg viewBox="0 0 920 960" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Schéma de l'architecture applicative de BENIN CYBER SHIELD">
      <defs>
        <marker id="arrow" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="8" markerHeight="7" orient="auto">
          <polygon points="0,0 10,4 0,8" fill="#166534" />
        </marker>

        <style>
          .layer { fill: #f0fdf4; stroke: #166534; stroke-width: 1.6; }
          .layer-title { fill: #dcfce7; stroke: #166534; stroke-width: 1.2; }
          .box { fill: #ffffff; stroke: #86efac; stroke-width: 1.2; }
          .title { fill: #14532d; font-size: 15px; font-weight: 700; letter-spacing: 1.5px; }
          .box-title { fill: #14532d; font-size: 14px; font-weight: 700; }
          .text { fill: #1f2937; font-size: 13px; }
          .muted { fill: #4b5563; font-size: 12px; font-style: italic; }
          .arrow { stroke: #166534; stroke-width: 1.7; marker-end: url(#arrow); }
          .line { stroke: #86efac; stroke-width: 1; }
        </style>
      </defs>

      <!-- Couche client -->
      <rect x="30" y="20" width="860" height="170" rx="8" class="layer" />
      <rect x="30" y="20" width="860" height="34" rx="8" class="layer-title" />
      <text x="460" y="43" text-anchor="middle" class="title">COUCHE CLIENT</text>

      <rect x="55" y="72" width="385" height="95" rx="6" class="box" />
      <text x="247" y="96" text-anchor="middle" class="box-title">Application Web - React / Vite</text>
      <text x="80" y="122" class="text">• Portail citoyen</text>
      <text x="80" y="144" class="text">• Espace PME</text>
      <text x="260" y="122" class="text">• Console Admin</text>

      <rect x="480" y="72" width="385" height="95" rx="6" class="box" />
      <text x="672" y="96" text-anchor="middle" class="box-title">Application Mobile - Flutter</text>
      <text x="505" y="122" class="text">• Android</text>
      <text x="505" y="144" class="text">• Surveillance des notifications</text>
      <text x="695" y="144" class="text">• Redirection portail</text>

      <line x1="460" y1="192" x2="460" y2="237" class="arrow" />
      <rect x="345" y="203" width="230" height="22" rx="4" fill="#ffffff" />
      <text x="460" y="218" text-anchor="middle" class="muted">Requêtes HTTPS / JSON</text>

      <!-- Couche API -->
      <rect x="30" y="240" width="860" height="135" rx="8" class="layer" />
      <rect x="30" y="240" width="860" height="34" rx="8" class="layer-title" />
      <text x="460" y="263" text-anchor="middle" class="title">COUCHE API</text>
      <text x="460" y="300" text-anchor="middle" class="box-title">FastAPI Backend</text>
      <text x="95" y="330" class="text">• Validation Pydantic</text>
      <text x="95" y="352" class="text">• Authentification JWT</text>
      <text x="530" y="330" class="text">• Routes REST /api/v1</text>
      <text x="530" y="352" class="text">• CORS / sécurité</text>

      <line x1="460" y1="377" x2="460" y2="422" class="arrow" />

      <!-- Couche services -->
      <rect x="30" y="425" width="860" height="205" rx="8" class="layer" />
      <rect x="30" y="425" width="860" height="34" rx="8" class="layer-title" />
      <text x="460" y="448" text-anchor="middle" class="title">COUCHE SERVICES</text>
      <line x1="460" y1="470" x2="460" y2="608" class="line" stroke-dasharray="4 4" />

      <text x="65" y="492" class="text">• Moteur d'analyse des messages</text>
      <text x="65" y="518" class="text">• Service de signalement formel</text>
      <text x="65" y="544" class="text">• Service de détection d'usurpation PME</text>
      <text x="65" y="570" class="text">• Service de génération des dossiers forensiques</text>

      <text x="500" y="492" class="text">• Service de transmission externe</text>
      <text x="500" y="518" class="text">• Workers Redis : transmissions / résultats OSINT</text>
      <text x="500" y="544" class="text">• Service Playwright / Scraper</text>
      <text x="520" y="568" class="muted">(capture de preuves activable)</text>

      <line x1="460" y1="632" x2="460" y2="652" stroke="#166534" stroke-width="1.7" />
      <line x1="255" y1="652" x2="665" y2="652" stroke="#166534" stroke-width="1.7" />
      <line x1="255" y1="652" x2="255" y2="690" class="arrow" />
      <line x1="665" y1="652" x2="665" y2="690" class="arrow" />

      <!-- Couche données -->
      <rect x="30" y="695" width="500" height="230" rx="8" class="layer" />
      <rect x="30" y="695" width="500" height="34" rx="8" class="layer-title" />
      <text x="280" y="718" text-anchor="middle" class="title">COUCHE DONNÉES</text>

      <text x="60" y="756" class="box-title">PostgreSQL / Supabase</text>
      <text x="60" y="782" class="text">• utilisateurs</text>
      <text x="60" y="805" class="text">• messages</text>
      <text x="60" y="828" class="text">• analyses</text>
      <text x="260" y="782" class="text">• signalements</text>
      <text x="260" y="805" class="text">• PME / incidents</text>
      <text x="260" y="828" class="text">• dossiers / transmissions</text>

      <line x1="55" y1="850" x2="505" y2="850" class="line" stroke-dasharray="5 4" />
      <text x="60" y="878" class="box-title">Redis / Upstash</text>
      <text x="60" y="904" class="text">• files d'attente</text>
      <text x="260" y="904" class="text">• traitements asynchrones</text>

      <!-- Systèmes externes -->
      <rect x="560" y="695" width="330" height="150" rx="8" class="layer" />
      <rect x="560" y="695" width="330" height="34" rx="8" class="layer-title" />
      <text x="725" y="718" text-anchor="middle" class="title">SYSTÈMES EXTERNES</text>
      <text x="590" y="758" class="text">• API ASIN / CNIN simulée</text>
      <text x="590" y="784" class="text">• API opérateurs simulée</text>
      <text x="610" y="808" class="muted">(MTN / Moov)</text>
      <text x="590" y="832" class="muted">Connecteurs REST simulés</text>
    </svg>
  </main>
</body>
</html>
